name: Public Repo Onay ve Kurulum Sistemi

on:
  issue_comment:
    types: [created]

jobs:
  repo-onayla-ve-olustur:
    if: ${{ !github.event.issue.pull_request && github.event.comment.body == '/repo-onay' }}
    runs-on: ubuntu-latest
    steps:
      - name: Yetki Kontrolü
        env:
          YORUM_YAPAN: ${{ github.event.comment.user.login }}
          YETKILILER: "sedo,baskanin_kullanici_adi" # Onay verecek kişileri araya virgül koyarak yazın
        run: |
          # Kullanıcı adını tam eşleştirmek için başa ve sona virgül ekledik (Yetki bug'ı çözüldü)
          if [[ ",$YETKILILER," != *",$YORUM_YAPAN,"* ]]; then
            echo "❌ Hata: Bu işlemi sadece yetkililer yapabilir!"
            exit 1
          fi
          echo "✅ Yetki doğrulandı: $YORUM_YAPAN"

      - name: Şablondan Verileri Çek
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Issue'yu okumak için gereken geçici token
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # CRITICAL FIX: Çok satırlı veriyi YAML içine gömmek yerine GitHub CLI ile güvenli çekiyoruz
          BODY=$(gh issue view $ISSUE_NUMBER --json body --jq '.body')
          
          TAKIM=$(echo "$BODY" | grep -i -m 1 "^TAKIM:" | cut -d':' -f2 | tr -d '\r' | xargs)
          PROJE=$(echo "$BODY" | grep -i -m 1 "^PROJE:" | cut -d':' -f2 | tr -d '\r' | xargs)
          MAINTAINER=$(echo "$BODY" | grep -i -m 1 "^MAINTAINER:" | cut -d':' -f2 | tr -d '\r' | xargs)
          
          if [[ -z "$TAKIM" || -z "$PROJE" || -z "$MAINTAINER" ]]; then
            echo "❌ Hata: Issue formatı yanlış veya eksik doldurulmuş!"
            exit 1
          fi
          
          echo "takim=$TAKIM" >> $GITHUB_OUTPUT
          echo "proje=$PROJE" >> $GITHUB_OUTPUT
          echo "maintainer=$MAINTAINER" >> $GITHUB_OUTPUT

      - name: Public Repoyu Oluştur ve Ayarla
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: "TFN-Software-Team"
          TAKIM: ${{ steps.parse.outputs.takim }}
          PROJE: ${{ steps.parse.outputs.proje }}
          MAINTAINER: ${{ steps.parse.outputs.maintainer }}
        run: |
          REPO_NAME="${TAKIM}-${PROJE}"
          
          echo "1. $REPO_NAME reposu PUBLIC olarak oluşturuluyor..."
          gh repo create "$ORG/$REPO_NAME" --public --add-readme
          
          echo "2. $MAINTAINER Maintainer yapılıyor..."
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/$ORG/$REPO_NAME/collaborators/$MAINTAINER \
            -f permission='maintain'
            
          echo "3. Branch koruma kuralları uygulanıyor..."
          cat << 'EOF' > protection.json
          {
            "required_status_checks": null,
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null
          }
          EOF
          
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/$ORG/$REPO_NAME/branches/main/protection \
            --input protection.json

      - name: İşlemi Tamamla ve Issue'yu Kapat
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          REPO_URL: "https://github.com/TFN-Software-Team/${{ steps.parse.outputs.takim }}-${{ steps.parse.outputs.proje }}"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "🚀 **İşlem Başarılı!** Repo onaylandı ve oluşturuldu.<br>👉 [Repoya Gitmek İçin Tıklayın]($REPO_URL)"
          gh issue close $ISSUE_NUMBER
