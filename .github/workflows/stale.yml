name: Stale Issue ve PR Kapatıcı

on:
  schedule:
    - cron: '0 10 * * *' # Her gün saat 10:00'da çalışır

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: >
            Bu issue 30 gündür güncellenmedi. 7 gün içinde
            aktivite olmazsa otomatik kapatılacak.
            Hâlâ geçerliyse yorum yaparak yeniden açabilirsiniz.
          close-issue-message: >
            Uzun süredir aktivite olmadığı için kapatıldı.
            Gerekirse yeniden açabilirsiniz.
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            Bu PR 21 gündür güncellenmedi. 7 gün içinde
            aktivite olmazsa otomatik kapatılacak.
          close-pr-message: >
            Uzun süredir aktivite olmadığı için kapatıldı.
            Gerekirse yeniden açabilirsiniz.
          exempt-issue-labels: 'pinned,in-progress,repo-talebi'
          exempt-pr-labels: 'pinned,in-progress'